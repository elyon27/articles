<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Articles</title>

<style>
.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,.6);
  padding:6px 10px;
  border-radius:999px;
  color:#d8b46a;
  font-weight:700;
  z-index:3;
}
.card { position:relative; border:1px solid #ccc; border-radius:10px; overflow:hidden; }
.thumb { position:relative; }
</style>
</head>

<body>

<div id="grid"></div>

<script>
const PDF_DIR = "assets/articles/";
const COVERS_DIR = "assets/articles/covers/";
const MANIFEST = "./assets/articles/articles.json";

const grid = document.getElementById("grid");
let all = [];

function baseName(filename) {
  const i = filename.lastIndexOf(".");
  return i >= 0 ? filename.slice(0, i) : filename;
}

function buildCard(item){
  const card = document.createElement("div");
  card.className = "card";

  const thumb = document.createElement("div");
  thumb.className = "thumb";

  const img = document.createElement("img");
  img.src = COVERS_DIR + item.cover;
  img.style.width = "100%";

  thumb.appendChild(img);

  const badge = document.createElement("div");
  badge.className = "badge";
  badge.textContent = "#" + (item.number ?? "");
  thumb.appendChild(badge);

  const title = document.createElement("h3");
  title.textContent = item.title;

  card.appendChild(thumb);
  card.appendChild(title);

  return card;
}

function render(list){
  grid.innerHTML = "";
  list.forEach(item => grid.appendChild(buildCard(item)));
}

async function loadManifest(){
  const res = await fetch(MANIFEST);
  const data = await res.json();

  all = data.map((item, index) => ({
    ...item,
    number: item.number ?? index + 1
  }));

  render(all);
}

loadManifest();
</script>

</body>
</html>
