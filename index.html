<!doctype html>
<html lang="en">
<head>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-076DP9YSQL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-076DP9YSQL');
  </script>


  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Articles</title>
  <meta name="description" content="Articles library" />

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    :root{
      --bg:#070b12;
      --card:#0e1422;
      --text:#e9eefc;
      --muted:#b8c2dd;
      --line:rgba(255,255,255,.10);
      --gold:#d8b46a;
    }
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(216,180,106,.10), transparent 60%),
                  radial-gradient(900px 600px at 90% 0%, rgba(90,160,255,.10), transparent 55%),
                  var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    main{
      max-width:1100px;
      margin:0 auto;
      padding:28px 16px 64px;
    }

    .page-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin:6px 0 18px;
      padding-bottom:14px;
      border-bottom:1px solid var(--line);
    }
    .page-head h1{
      margin:0;
      font-size:28px;
      letter-spacing:.2px;
    }
    .page-head p{
      margin:6px 0 0;
      color:var(--muted);
      max-width:70ch;
      line-height:1.5;
    }

    .new-articles{
      margin:0 0 18px;
      padding:18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:0 10px 30px rgba(0,0,0,.22);
    }
    .new-articles-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }
    .new-articles-title{
      margin:0;
      font-size:18px;
      color:var(--gold);
      letter-spacing:.2px;
    }
    .new-articles-subtitle{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .new-articles-list{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:10px;
    }
    .new-articles-item{
      min-height:58px;
    }
    .new-articles-link{
      display:flex;
      align-items:flex-start;
      gap:10px;
      width:100%;
      height:100%;
      text-decoration:none;
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:12px;
      background:rgba(255,255,255,.04);
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      box-sizing:border-box;
    }
    .new-articles-link:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.08);
      border-color:rgba(216,180,106,.4);
    }
    .new-articles-index{
      flex:0 0 auto;
      width:24px;
      height:24px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:rgba(216,180,106,.14);
      border:1px solid rgba(216,180,106,.28);
      color:var(--gold);
      font-size:12px;
      font-weight:700;
      margin-top:1px;
    }
    .new-articles-name{
      display:block;
      font-size:13px;
      line-height:1.45;
      word-break:break-word;
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .search{
      display:flex;
      align-items:center;
      gap:8px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 12px;
      min-width:260px;
    }
    .search input{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:14px;
      margin-top:16px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); }
      .new-articles-list{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px){
      .page-head{ flex-direction:column; align-items:flex-start; }
      .toolbar{ width:100%; }
      .search{ width:100%; min-width:0; }
      .count-chip, .category-group{ width:100%; }
      .category-group{ justify-content:flex-start; }
      .grid{ grid-template-columns:1fr; }
      .new-articles-list{ grid-template-columns:1fr; }
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      display:flex;
      flex-direction:column;
      min-height:320px;
    }

    .thumb{
      position:relative;
      aspect-ratio:16 / 10;
      background:rgba(0,0,0,.25);
      border-bottom:1px solid var(--line);
      display:grid;
      place-items:center;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .thumb .fallback{
      width:92%;
      height:82%;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.22);
      display:grid;
      place-items:center;
      color:var(--muted);
      text-align:center;
      padding:10px;
    }
    .badge{
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.16);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--gold);
      backdrop-filter:blur(6px);
    }

    .content{
      padding:14px 14px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }
    .title{
      margin:0;
      font-size:16px;
      line-height:1.25;
      letter-spacing:.2px;
    }
    .desc{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      flex:1;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-top:4px;
      flex-wrap:wrap;
    }

    .article-links{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:10px;
      width:100%;
    }

    .flag-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .flag-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:44px;
      height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      text-decoration:none;
      font-size:22px;
      line-height:1;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
    }

    .flag-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.10);
      border-color:rgba(216,180,106,.55);
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:10px 12px;
      text-decoration:none;
      font-weight:600;
      font-size:13px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--text);
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      white-space:nowrap;
    }
    .btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.10);
      border-color:rgba(216,180,106,.55);
    }
    .btn .icon{
      display:inline-grid;
      place-items:center;
      width:22px;
      height:22px;
      border-radius:999px;
      background:rgba(216,180,106,.14);
      border:1px solid rgba(216,180,106,.28);
      color:var(--gold);
      font-size:12px;
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    .count-chip,
    .category-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      white-space:nowrap;
    }

    .count-chip{
      box-shadow:0 0 0 rgba(216,180,106,0);
      animation:countGlow 2.8s ease-in-out infinite;
    }

    button.count-chip,
    button.category-chip{
      cursor:pointer;
      font:inherit;
    }

    .count-chip strong,
    .category-chip strong{
      color:var(--gold);
      font-weight:700;
    }

    .category-group{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .category-chip{
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
      user-select:none;
    }
    .category-chip:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.10);
      border-color:rgba(216,180,106,.36);
    }
    .category-chip.active{
      background:rgba(216,180,106,.14);
      border-color:rgba(216,180,106,.52);
      box-shadow:0 0 18px rgba(216,180,106,.12);
    }

    .article-categories{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .article-category{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:var(--gold);
      font-size:12px;
      white-space:nowrap;
    }

    @keyframes countGlow {
      0%, 100% {
        box-shadow:0 0 0 rgba(216,180,106,0);
        border-color:rgba(255,255,255,.12);
      }
      50% {
        box-shadow:0 0 18px rgba(216,180,106,.18);
        border-color:rgba(216,180,106,.36);
      }
    }

    .article-highlight{
      animation:articleFlash 1.8s ease;
    }

    @keyframes articleFlash {
      0% {
        box-shadow:0 0 0 rgba(216,180,106,0);
        border-color:rgba(255,255,255,.10);
      }
      35% {
        box-shadow:0 0 0 3px rgba(216,180,106,.22), 0 14px 40px rgba(216,180,106,.18);
        border-color:rgba(216,180,106,.70);
      }
      100% {
        box-shadow:0 10px 30px rgba(0,0,0,.25);
        border-color:rgba(255,255,255,.10);
      }
    }

    .empty{
      margin-top:18px;
      padding:16px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      display:none;
    }

    .back-badge {
      text-decoration:none;
      font-weight:600;
      letter-spacing:0.4px;
      padding:8px 16px;
      border-radius:8px;
      background:rgba(255,255,255,0.08);
      color:#e9eefc;
      border:1px solid rgba(255,255,255,0.18);
      transition:all 0.25s ease;
    }

    .back-badge:hover {
      background:rgba(255,255,255,0.14);
      border-color:rgba(255,255,255,0.35);
      transform:translateY(-1px);
    }
  </style>
</head>

<body>
<header class="site-header">
  <div class="container navbar">
    <a class="brand" href="https://crownmind.netlify.app" aria-label="CrownMind Institute Home">
      <img src="assets/img/crownmindlogo.jpg" alt="CrownMind Institute Logo" class="brand-logo">
      <span>CrownMind Institute</span>
    </a>

    <nav>
      <div class="links" style="display:flex; gap:10px;">
        <a href="https://crownmind-community.netlify.app/" class="back-badge">Community</a>
        <a href="https://crownmind.netlify.app" class="back-badge">Back To Mission</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <section class="new-articles" aria-labelledby="new-articles-title">
    <div class="new-articles-head">
      <div>
        <h2 id="new-articles-title" class="new-articles-title">5 New Added Article Files</h2>
      </div>
    </div>
    <ul id="new-articles-list" class="new-articles-list"></ul>
  </section>

  <div class="page-head">
    <div class="toolbar">
      <div class="search" aria-label="Search articles">
        <span style="opacity:.8;">🔎</span>
        <input id="q" type="search" placeholder="Search title…" autocomplete="off" />
      </div>

      <div id="article-count" class="count-chip small" aria-live="polite">
        <strong>0</strong> Articles
      </div>

      <button type="button" id="category-total" class="count-chip small" aria-live="polite">
        <strong>0</strong> Categories
      </button>

      <div class="category-group small" aria-label="Category breakdown">
        <button type="button" id="count-doctrine-rev" class="category-chip" data-category="Doctrine & Revelation"><strong>0</strong> Doctrine & Revelation</button>
        <button type="button" id="count-prophetic" class="category-chip" data-category="Prophetic Scrolls"><strong>0</strong> Prophetic Scrolls</button>
        <button type="button" id="count-growth" class="category-chip" data-category="Spiritual Growth"><strong>0</strong> Spiritual Growth</button>
        <button type="button" id="count-wisdom" class="category-chip" data-category="Wisdom & Character"><strong>0</strong> Wisdom & Character</button>
        <button type="button" id="count-kingdom" class="category-chip" data-category="Kingdom Living"><strong>0</strong> Kingdom Living</button>
      </div>
    </div>
  </div>

  <section class="grid" id="grid" aria-live="polite"></section>
  <div class="empty" id="empty"></div>
</main>

<script>
  const PDF_DIR = "assets/articles/";
  const TAGALOG_DIR = "assets/articles/Tagalog/";
  const SPANISH_DIR = "assets/articles/Spanish/";
  const COVERS_DIR = "assets/articles/covers/";
  const MANIFEST = new URL("./assets/articles/articles.json", window.location.href).href;

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const q = document.getElementById("q");
  const countEl = document.getElementById("article-count");
  const categoryTotalEl = document.getElementById("category-total");
  const newArticlesListEl = document.getElementById("new-articles-list");

  const countDoctrineRevEl = document.getElementById("count-doctrine-rev");
  const countPropheticEl = document.getElementById("count-prophetic");
  const countGrowthEl = document.getElementById("count-growth");
  const countWisdomEl = document.getElementById("count-wisdom");
  const countKingdomEl = document.getElementById("count-kingdom");
  const categoryButtons = [countDoctrineRevEl, countPropheticEl, countGrowthEl, countWisdomEl, countKingdomEl].filter(Boolean);

  let all = [];
  let activeCategory = "";

  function escapeHtml(s = "") {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function baseName(filename) {
    const i = filename.lastIndexOf(".");
    return i >= 0 ? filename.slice(0, i) : filename;
  }

  function normalizeCategoryName(value = "") {
    const raw = String(value).trim().toLowerCase();
    const map = {
      "doctrine": "Doctrine & Revelation",
      "doctrine & revelation": "Doctrine & Revelation",
      "prophetic": "Prophetic Scrolls",
      "prophetic scrolls": "Prophetic Scrolls",
      "scroll": "Prophetic Scrolls",
      "scrolls": "Prophetic Scrolls",
      "spiritual growth": "Spiritual Growth",
      "growth": "Spiritual Growth",
      "wisdom": "Wisdom & Character",
      "wisdom & character": "Wisdom & Character",
      "character": "Wisdom & Character",
      "kingdom": "Kingdom Living",
      "kingdom living": "Kingdom Living"
    };
    return map[raw] || String(value).trim();
  }

  function getCategories(item) {
    if (Array.isArray(item.categories) && item.categories.length) {
      return [...new Set(item.categories.map(normalizeCategoryName).filter(Boolean))];
    }
    if (typeof item.tag === "string" && item.tag.trim()) {
      return [normalizeCategoryName(item.tag)];
    }
    return ["Spiritual Growth"];
  }

  function syncActiveCategoryButtons() {
    categoryButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.category === activeCategory));
  }

  function setActiveCategory(category = "") {
    activeCategory = activeCategory === category ? "" : category;
    syncActiveCategoryButtons();
    applyFilter();
  }

  function showAllArticles() {
    activeCategory = "";
    syncActiveCategoryButtons();
    applyFilter();
  }

  function getOldestArticles(sourceList, limit = 5) {
    return [...sourceList]
      .sort((a, b) => {
        const aNum = Number(a.number) || 0;
        const bNum = Number(b.number) || 0;
        return aNum - bNum;
      })
      .slice(0, limit);
  }

  function articleAnchorId(item) {
    const raw = item?.file || item?.title || `article-${item?.number ?? ""}`;
    return "article-" + String(raw)
      .toLowerCase()
      .replace(/\.[^.]+$/, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function scrollToArticle(anchorId) {
    if (!anchorId) return;
    const target = document.getElementById(anchorId);
    if (!target) return;

    target.scrollIntoView({ behavior: "smooth", block: "start" });

    target.classList.add("article-highlight");
    window.setTimeout(() => {
      target.classList.remove("article-highlight");
    }, 1800);
  }

  function renderNewArticles(sourceList) {
    if (!newArticlesListEl) return;
    const oldest = getOldestArticles(sourceList, 5);
    if (!oldest.length) {
      newArticlesListEl.innerHTML = '<li class="new-articles-item"><div class="new-articles-link">No article files available yet.</div></li>';
      return;
    }

    newArticlesListEl.innerHTML = oldest.map((item, index) => {
      const anchorId = articleAnchorId(item);
      const file = item.file || "Untitled.pdf";
      return `
        <li class="new-articles-item">
          <a class="new-articles-link" href="#${anchorId}" data-article-target="${anchorId}">
            <span class="new-articles-index">${index + 1}</span>
            <span class="new-articles-name">${escapeHtml(file)}</span>
          </a>
        </li>
      `;
    }).join("");
  }

  function buildCard(item) {
    const title = item.title || baseName(item.file || "Untitled");
    const file = item.file;
    const desc = item.description || "PDF article";
    const categories = getCategories(item);
    const pdfHref = PDF_DIR + file;
    const tagalogHref = TAGALOG_DIR + (item.tagalogFile || file);
    const spanishHref = SPANISH_DIR + (item.spanishFile || file);

    const coverCandidates = [];
    if (item.cover) coverCandidates.push(COVERS_DIR + item.cover);

    const name = baseName(file);
    coverCandidates.push(
      COVERS_DIR + name + ".jpg",
      COVERS_DIR + name + ".png",
      COVERS_DIR + name + ".webp",
      COVERS_DIR + name + ".jpeg"
    );

    const card = document.createElement("article");
    card.className = "card";
    card.id = articleAnchorId(item);

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const img = document.createElement("img");
    img.alt = title + " cover";
    img.loading = "lazy";

    const fallback = document.createElement("div");
    fallback.className = "fallback";
    fallback.innerHTML = `
      <div>
        <div style="font-size:34px; line-height:1;">📄</div>
        <div style="margin-top:8px;">No cover image</div>
        <div style="margin-top:4px; font-size:12px; opacity:.9;">Add: <b>assets/articles/covers/${escapeHtml(name)}.jpg</b></div>
      </div>
    `;

    let tried = 0;
    function tryNextCover() {
      if (tried >= coverCandidates.length) {
        if (!thumb.contains(fallback)) thumb.appendChild(fallback);
        return;
      }
      img.src = coverCandidates[tried++];
    }

    img.onerror = tryNextCover;
    img.onload = () => {
      if (thumb.contains(fallback)) fallback.remove();
    };
    tryNextCover();

    thumb.appendChild(img);

    const numberBadge = document.createElement("button");
    numberBadge.className = "badge article-number";
    numberBadge.type = "button";
    numberBadge.textContent = "#" + (item.number ?? "");
    thumb.appendChild(numberBadge);

    const content = document.createElement("div");
    content.className = "content";

    const categoriesHtml = categories
      .map(cat => `<span class="article-category">${escapeHtml(cat)}</span>`)
      .join("");

    content.innerHTML = `
      <h3 class="title">${escapeHtml(title)}</h3>
      <div class="article-categories">${categoriesHtml}</div>
      <p class="desc">${escapeHtml(desc)}</p>
    `;

    const actions = document.createElement("div");
    actions.className = "actions";

    const articleLinks = document.createElement("div");
    articleLinks.className = "article-links";

    const readBtn = document.createElement("a");
    readBtn.className = "btn";
    readBtn.href = pdfHref;
    readBtn.target = "_blank";
    readBtn.rel = "noopener";
    readBtn.innerHTML = `<span class="icon">📖</span> Read Article`;

    const backToTopBtn = document.createElement("button");
    backToTopBtn.className = "btn";
    backToTopBtn.innerHTML = `<span class="icon">⬆️</span> Back To Top`;

    backToTopBtn.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });

    const flagActions = document.createElement("div");
    flagActions.className = "flag-actions";

    const americanBtn = document.createElement("a");
    americanBtn.className = "flag-btn";
    americanBtn.href = pdfHref;
    americanBtn.target = "_blank";
    americanBtn.rel = "noopener";
    americanBtn.setAttribute("aria-label", `Read ${title} in English`);
    americanBtn.title = "Read English article";
    americanBtn.textContent = "🇺🇸";

    const philippinesBtn = document.createElement("a");
    philippinesBtn.className = "flag-btn";
    philippinesBtn.href = tagalogHref;
    philippinesBtn.target = "_blank";
    philippinesBtn.rel = "noopener";
    philippinesBtn.setAttribute("aria-label", `Read ${title} in Tagalog`);
    philippinesBtn.title = "Read Tagalog article";
    philippinesBtn.textContent = "🇵🇭";

    const spainBtn = document.createElement("a");
    spainBtn.className = "flag-btn";
    spainBtn.href = spanishHref;
    spainBtn.target = "_blank";
    spainBtn.rel = "noopener";
    spainBtn.setAttribute("aria-label", `Read ${title} in Spanish`);
    spainBtn.title = "Read Spanish article";
    spainBtn.textContent = "🇪🇸";

    flagActions.appendChild(americanBtn);
    flagActions.appendChild(philippinesBtn);
    flagActions.appendChild(spainBtn);
    const topActions = document.createElement("div");
    topActions.style.display = "flex";
    topActions.style.gap = "10px";
    topActions.style.flexWrap = "wrap";

    topActions.appendChild(readBtn);
    topActions.appendChild(backToTopBtn);

    articleLinks.appendChild(topActions);
    articleLinks.appendChild(flagActions);

    const meta = document.createElement("span");
    meta.className = "small";
    meta.textContent = file;

    actions.appendChild(articleLinks);
    actions.appendChild(meta);
    content.appendChild(actions);

    // Create date element
    const dateEl = document.createElement("div");
    dateEl.className = "small";
    dateEl.style.padding = "8px 14px 0";
    dateEl.style.color = "var(--muted)";
    dateEl.textContent = item.date ? item.date : "No date available";

    // Append elements in correct order
    card.appendChild(thumb);
    card.appendChild(dateEl);
    card.appendChild(content);

    return card;
  }

  function updateCounts(sourceList) {
    let totalCategoryCount = 0;
    const counts = {
      "Doctrine & Revelation": 0,
      "Prophetic Scrolls": 0,
      "Spiritual Growth": 0,
      "Wisdom & Character": 0,
      "Kingdom Living": 0
    };

    sourceList.forEach(item => {
      const cats = getCategories(item);
      totalCategoryCount += cats.length;
      cats.forEach(cat => { if (counts[cat] !== undefined) counts[cat]++; });
    });

    if (countEl) countEl.innerHTML = `<strong>${sourceList.length}</strong> Article${sourceList.length !== 1 ? "s" : ""}`;
    if (categoryTotalEl) categoryTotalEl.innerHTML = `<strong>${totalCategoryCount}</strong> Categories`;
    if (countDoctrineRevEl) countDoctrineRevEl.innerHTML = `<strong>${counts["Doctrine & Revelation"]}</strong> Doctrine & Revelation`;
    if (countPropheticEl) countPropheticEl.innerHTML = `<strong>${counts["Prophetic Scrolls"]}</strong> Prophetic Scrolls`;
    if (countGrowthEl) countGrowthEl.innerHTML = `<strong>${counts["Spiritual Growth"]}</strong> Spiritual Growth`;
    if (countWisdomEl) countWisdomEl.innerHTML = `<strong>${counts["Wisdom & Character"]}</strong> Wisdom & Character`;
    if (countKingdomEl) countKingdomEl.innerHTML = `<strong>${counts["Kingdom Living"]}</strong> Kingdom Living`;
  }

  function render(list) {
    grid.innerHTML = "";
    list.forEach(item => grid.appendChild(buildCard(item)));
    empty.style.display = list.length ? "none" : "block";
    empty.innerHTML = list.length ? "" : "No articles matched your current search or category filter.";
    updateCounts(all);
    renderNewArticles(all);
  }

  function applyFilter() {
    const term = (q.value || "").trim().toLowerCase();
    const filtered = all.filter(a => {
      const categories = getCategories(a);
      const matchesCategory = !activeCategory || categories.includes(activeCategory);
      if (!matchesCategory) return false;

      if (!term) return true;
      const t = (a.title || "").toLowerCase();
      const d = (a.description || "").toLowerCase();
      const f = (a.file || "").toLowerCase();
      const c = categories.join(" ").toLowerCase();
      return t.includes(term) || d.includes(term) || f.includes(term) || c.includes(term);
    });
    render(filtered);
  }

        { title: "I Am Who I Am", file: "I Am Who I Am.pdf", description: "“I Am Who I Am” is a profound exploration of identity beyond illusion—an unveiling of the eternal essence that exists apart from titles, past, and becoming. It invites the reader into a deeper encounter with truth itself: not as something to achieve, but as something ever-present, unchanging, and silently calling from within.", categories: ["Doctrine & Revelation"] },

        { title: "Setting Boundaries", file: "Setting Boundaries.pdf", description: "A powerful reflection on the unseen cost of people-pleasing, Setting Boundaries challenges the belief that endless giving is a virtue. It reveals how the absence of limits leads to self-abandonment, and how reclaiming one’s inner space is an act of truth, not selfishness. With quiet intensity, the article invites readers to draw sacred lines—not to shut others out, but to finally return to themselves.", categories: ["Wisdom & Character"] },
        { title: "Cry Of The Watchers", file: "Cry Of The Watchers.pdf", description: "A prophetic call to spiritual remembrance, this article declares the awakening of the Watchers and the convergence of the elect in the final hour of divine unveiling", categories: ["Prophetic Scrolls"] },

        { title: "When Silence Is Strength: Choosing Dignity Over Reaction", file: "When Silence Is Strength.pdf", description: "This article teaches that choosing silence over reaction is a disciplined act of dignity and inner strength that preserves peace and protects the integrity of the soul.", categories: ["Wisdom & Character"] }

  }

  if (newArticlesListEl) {
    newArticlesListEl.addEventListener("click", (event) => {
      const link = event.target.closest("[data-article-target]");
      if (!link) return;

      event.preventDefault();
      const anchorId = link.getAttribute("data-article-target");
      scrollToArticle(anchorId);
    });
  }

  q.addEventListener("input", applyFilter);
  if (categoryTotalEl) {
    categoryTotalEl.addEventListener("click", showAllArticles);
  }
  categoryButtons.forEach(btn => btn.addEventListener("click", () => setActiveCategory(btn.dataset.category)));
  loadManifest();
