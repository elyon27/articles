<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Articles</title>
  <meta name="description" content="Articles library" />

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    :root{
      --bg:#070b12;
      --card:#0e1422;
      --text:#e9eefc;
      --muted:#b8c2dd;
      --line:rgba(255,255,255,.10);
      --gold:#d8b46a;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(216,180,106,.10), transparent 60%),
        radial-gradient(900px 600px at 90% 0%, rgba(90,160,255,.10), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    main{
      max-width:1100px;
      margin:0 auto;
      padding:28px 16px 64px;
    }

    .page-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin:6px 0 18px;
      padding-bottom:14px;
      border-bottom:1px solid var(--line);
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      width:100%;
    }

    .search{
      display:flex;
      align-items:center;
      gap:8px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 12px;
      min-width:260px;
    }
    .search input{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:14px;
      margin-top:16px;
    }
    @media (max-width:980px){
      .grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
    }
    @media (max-width:640px){
      .page-head{ flex-direction:column; align-items:flex-start; }
      .toolbar{ width:100%; }
      .search{ width:100%; min-width:0; }
      .count-chip, .category-group{ width:100%; }
      .category-group{ justify-content:flex-start; }
      .grid{ grid-template-columns:1fr; }
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      display:flex;
      flex-direction:column;
      min-height:320px;
    }

    .thumb{
      position:relative;
      aspect-ratio:16 / 10;
      background:rgba(0,0,0,.25);
      border-bottom:1px solid var(--line);
      display:grid;
      place-items:center;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .thumb .fallback{
      width:92%;
      height:82%;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.22);
      display:grid;
      place-items:center;
      color:var(--muted);
      text-align:center;
      padding:10px;
    }
    .badge{
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.16);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--gold);
      backdrop-filter:blur(6px);
      z-index:1;
      max-width:calc(100% - 20px);
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .content{
      padding:14px 14px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }
    .title{
      margin:0;
      font-size:16px;
      line-height:1.25;
      letter-spacing:.2px;
    }
    .desc{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      flex:1;
    }

    .card-categories{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:2px;
    }

    .card-category-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(216,180,106,.28);
      background:rgba(216,180,106,.10);
      color:var(--gold);
      font-size:12px;
      font-weight:600;
      line-height:1.2;
      white-space:nowrap;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-top:4px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:10px 12px;
      text-decoration:none;
      font-weight:600;
      font-size:13px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--text);
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      white-space:nowrap;
    }
    .btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.10);
      border-color:rgba(216,180,106,.55);
    }
    .btn .icon{
      display:inline-grid;
      place-items:center;
      width:22px;
      height:22px;
      border-radius:999px;
      background:rgba(216,180,106,.14);
      border:1px solid rgba(216,180,106,.28);
      color:var(--gold);
      font-size:12px;
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    .count-chip,
    .category-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      white-space:nowrap;
    }

    .count-chip{
      box-shadow:0 0 0 rgba(216,180,106,0);
      animation:countGlow 2.8s ease-in-out infinite;
    }

    .count-chip strong,
    .category-chip strong{
      color:var(--gold);
      font-weight:700;
    }

    .category-group{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    @keyframes countGlow {
      0%, 100% {
        box-shadow:0 0 0 rgba(216,180,106,0);
        border-color:rgba(255,255,255,.12);
      }
      50% {
        box-shadow:0 0 18px rgba(216,180,106,.18);
        border-color:rgba(216,180,106,.36);
      }
    }

    .empty{
      margin-top:18px;
      padding:16px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      display:none;
    }

    .back-badge{
      text-decoration:none;
      font-weight:600;
      letter-spacing:.4px;
      padding:8px 16px;
      border-radius:8px;
      background:rgba(255,255,255,0.08);
      color:#e9eefc;
      border:1px solid rgba(255,255,255,0.18);
      transition:all .25s ease;
    }
    .back-badge:hover{
      background:rgba(255,255,255,0.14);
      border-color:rgba(255,255,255,0.35);
      transform:translateY(-1px);
    }
  </style>
</head>

<body>
<header class="site-header">
  <div class="container navbar">
    <a class="brand" href="https://crownmind.netlify.app" aria-label="CrownMind Institute Home">
      <img src="assets/img/crownmindlogo.jpg" alt="CrownMind Institute Logo" class="brand-logo">
      <span>CrownMind Institute</span>
    </a>

    <nav>
      <div class="links">
        <a href="https://crownmind.netlify.app" class="back-badge">Back To Mission</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="page-head">
    <div class="toolbar">
      <div class="search" aria-label="Search articles">
        <span style="opacity:.8;">🔎</span>
        <input id="q" type="search" placeholder="Search title…" autocomplete="off" />
      </div>

      <div id="article-count" class="count-chip small" aria-live="polite">
        <strong>0</strong> Articles
      </div>

      <div id="category-total" class="count-chip small" aria-live="polite">
        <strong>0</strong> Categories
      </div>

      <div class="category-group small" aria-label="Category breakdown">
        <div id="count-doctrine-rev" class="category-chip"><strong>0</strong> Doctrine &amp; Revelation</div>
        <div id="count-prophetic" class="category-chip"><strong>0</strong> Prophetic Scrolls</div>
        <div id="count-growth" class="category-chip"><strong>0</strong> Spiritual Growth</div>
        <div id="count-wisdom" class="category-chip"><strong>0</strong> Wisdom &amp; Character</div>
        <div id="count-kingdom" class="category-chip"><strong>0</strong> Kingdom Living</div>
      </div>
    </div>
  </div>

  <section class="grid" id="grid" aria-live="polite"></section>
  <div class="empty" id="empty"></div>
</main>

<script>
  const PDF_DIR = "assets/articles/";
  const COVERS_DIR = "assets/articles/covers/";
  const MANIFEST = new URL("./assets/articles/articles.json", window.location.href).href;

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const q = document.getElementById("q");
  const countEl = document.getElementById("article-count");
  const categoryTotalEl = document.getElementById("category-total");
  const countDoctrineRevEl = document.getElementById("count-doctrine-rev");
  const countPropheticEl = document.getElementById("count-prophetic");
  const countGrowthEl = document.getElementById("count-growth");
  const countWisdomEl = document.getElementById("count-wisdom");
  const countKingdomEl = document.getElementById("count-kingdom");

  let all = [];

  function escapeHtml(s = ""){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[c]));
  }

  function baseName(filename = ""){
    const i = filename.lastIndexOf(".");
    return i >= 0 ? filename.slice(0, i) : filename;
  }

  function normalizeCategoryName(value = ""){
    const raw = String(value).trim().toLowerCase();
    const map = {
      "doctrine": "Doctrine & Revelation",
      "doctrine & revelation": "Doctrine & Revelation",
      "revelation": "Doctrine & Revelation",
      "prophetic": "Prophetic Scrolls",
      "prophetic scrolls": "Prophetic Scrolls",
      "scroll": "Prophetic Scrolls",
      "scrolls": "Prophetic Scrolls",
      "spiritual growth": "Spiritual Growth",
      "growth": "Spiritual Growth",
      "wisdom": "Wisdom & Character",
      "wisdom & character": "Wisdom & Character",
      "character": "Wisdom & Character",
      "kingdom": "Kingdom Living",
      "kingdom living": "Kingdom Living"
    };
    return map[raw] || String(value).trim();
  }

  function getCategories(item){
    if (Array.isArray(item.categories) && item.categories.length) {
      return [...new Set(item.categories.map(normalizeCategoryName).filter(Boolean))];
    }
    if (typeof item.tag === "string" && item.tag.trim()) {
      return [normalizeCategoryName(item.tag)];
    }
    return ["Spiritual Growth"];
  }

  function getPrimaryCategory(item){
    const categories = getCategories(item);
    return categories[0] || "Spiritual Growth";
  }

  function buildCard(item){
    const title = item.title || baseName(item.file || "Untitled");
    const file = item.file || "";
    const desc = item.description || "PDF article";
    const categories = getCategories(item);
    const badgeLabel = getPrimaryCategory(item);
    const pdfHref = PDF_DIR + file;
    const name = baseName(file);

    const coverCandidates = [
      COVERS_DIR + name + ".jpg",
      COVERS_DIR + name + ".png",
      COVERS_DIR + name + ".webp"
    ];

    const card = document.createElement("article");
    card.className = "card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const badge = document.createElement("div");
    badge.className = "badge";
    badge.textContent = badgeLabel;

    const img = document.createElement("img");
    img.alt = title + " cover";
    img.loading = "lazy";

    const fallback = document.createElement("div");
    fallback.className = "fallback";
    fallback.innerHTML = `
      <div>
        <div style="font-size:34px; line-height:1;">📄</div>
        <div style="margin-top:8px;">No cover image</div>
        <div style="margin-top:4px; font-size:12px; opacity:.9;">
          Add: <b>assets/articles/covers/${escapeHtml(name)}.jpg</b>
        </div>
      </div>
    `;

    let tried = 0;
    function tryNextCover(){
      if (tried >= coverCandidates.length) {
        if (!thumb.contains(fallback)) thumb.appendChild(fallback);
        return;
      }
      img.src = coverCandidates[tried++];
    }

    img.onerror = tryNextCover;
    img.onload = () => {
      if (thumb.contains(fallback)) fallback.remove();
    };

    tryNextCover();

    thumb.appendChild(badge);
    thumb.appendChild(img);

    const content = document.createElement("div");
    content.className = "content";

    const categoryButtons = document.createElement("div");
    categoryButtons.className = "card-categories";
    categories.forEach(category => {
      const chip = document.createElement("div");
      chip.className = "card-category-btn";
      chip.textContent = category;
      categoryButtons.appendChild(chip);
    });

    const titleEl = document.createElement("h3");
    titleEl.className = "title";
    titleEl.textContent = title;

    const descEl = document.createElement("p");
    descEl.className = "desc";
    descEl.textContent = desc;

    content.appendChild(categoryButtons);
    content.appendChild(titleEl);
    content.appendChild(descEl);

    const actions = document.createElement("div");
    actions.className = "actions";

    const readBtn = document.createElement("a");
    readBtn.className = "btn";
    readBtn.href = pdfHref;
    readBtn.target = "_blank";
    readBtn.rel = "noopener";
    readBtn.innerHTML = `<span class="icon">📖</span> Read Article`;

    const meta = document.createElement("span");
    meta.className = "small";
    meta.textContent = file;

    actions.appendChild(readBtn);
    actions.appendChild(meta);
    content.appendChild(actions);

    card.appendChild(thumb);
    card.appendChild(content);
    return card;
  }

  function updateCounts(list){
    let totalCategoryCount = 0;
    const counts = {
      "Doctrine & Revelation": 0,
      "Prophetic Scrolls": 0,
      "Spiritual Growth": 0,
      "Wisdom & Character": 0,
      "Kingdom Living": 0
    };

    list.forEach(item => {
      const cats = getCategories(item);
      totalCategoryCount += cats.length;
      cats.forEach(cat => {
        if (Object.prototype.hasOwnProperty.call(counts, cat)) {
          counts[cat]++;
        }
      });
    });

    if (countEl) {
      countEl.innerHTML = `<strong>${list.length}</strong> Article${list.length !== 1 ? "s" : ""}`;
    }
    if (categoryTotalEl) {
      categoryTotalEl.innerHTML = `<strong>${totalCategoryCount}</strong> Categories`;
    }
    if (countDoctrineRevEl) {
      countDoctrineRevEl.innerHTML = `<strong>${counts["Doctrine & Revelation"]}</strong> Doctrine &amp; Revelation`;
    }
    if (countPropheticEl) {
      countPropheticEl.innerHTML = `<strong>${counts["Prophetic Scrolls"]}</strong> Prophetic Scrolls`;
    }
    if (countGrowthEl) {
      countGrowthEl.innerHTML = `<strong>${counts["Spiritual Growth"]}</strong> Spiritual Growth`;
    }
    if (countWisdomEl) {
      countWisdomEl.innerHTML = `<strong>${counts["Wisdom & Character"]}</strong> Wisdom &amp; Character`;
    }
    if (countKingdomEl) {
      countKingdomEl.innerHTML = `<strong>${counts["Kingdom Living"]}</strong> Kingdom Living`;
    }
  }

  function render(list){
    grid.innerHTML = "";
    list.forEach(item => grid.appendChild(buildCard(item)));
    empty.style.display = list.length ? "none" : "block";
    updateCounts(list);
  }

  function applyFilter(){
    const term = (q.value || "").trim().toLowerCase();
    if (!term) {
      render(all);
      return;
    }

    const filtered = all.filter(a => {
      const t = (a.title || "").toLowerCase();
      const d = (a.description || "").toLowerCase();
      const f = (a.file || "").toLowerCase();
      const c = getCategories(a).join(" ").toLowerCase();
      return t.includes(term) || d.includes(term) || f.includes(term) || c.includes(term);
    });

    render(filtered);
  }

  async function loadManifest(){
    try {
      const res = await fetch(MANIFEST, { cache: "no-store" });
      if (!res.ok) throw new Error("Manifest not found: " + MANIFEST);
      const data = await res.json();
      const list = Array.isArray(data) ? data : (data.articles || []);
      all = list.filter(x => x && x.file);
      render(all);
      empty.style.display = "none";
      empty.innerHTML = "";
    } catch (err) {
      console.error("Manifest load failed:", err);

      all = [
        { title: "I Am Who I Am", file: "I Am Who I Am.pdf", description: "“I Am Who I Am” is a profound exploration of identity beyond illusion—an unveiling of the eternal essence that exists apart from titles, past, and becoming. It invites the reader into a deeper encounter with truth itself: not as something to achieve, but as something ever-present, unchanging, and silently calling from within.", categories: ["Doctrine & Revelation"] },
        { title: "Why Do You Call Me Lord?", file: "Why Call Me Lord.pdf", description: "“Why Do You Call Me Lord?” is a piercing and transformative reflection that confronts the quiet contradiction between confession and obedience. It unveils the deeper meaning behind the word Lord, revealing that true surrender is not spoken—but lived. This article calls the reader beyond empty reverence into a life of alignment, where the throne of the heart is no longer self-ruled, but yielded fully to truth.", categories: ["Doctrine & Revelation"] },
        { title: "The 3 Witnesses (Spirit, Blood, Water)", file: "The 3 Witnesses.pdf", description: "The 3 Witnesses (Spirit, Blood, and Water) unveils a profound spiritual pattern that transcends doctrine and speaks directly to the soul. It reveals how truth is not merely spoken—but confirmed through divine alignment: the Spirit that inwardly knows, the Water that transforms, and the Blood that seals reality through sacrifice. This article invites the reader to recognize that true reality is not argued, but witnessed—within creation, within Christ, and within themselves.", categories: ["Doctrine & Revelation"] },
        { title: "There Has Never Been Any Shades Of Gray", file: "Never Any Shades Of Gray.pdf", description: "A piercing reflection on truth and illusion, There Has Never Been Any Shades of Gray unveils the hidden cost of moral compromise and the quiet deception of “in-between” thinking. It calls the reader back to a place of inner clarity—where truth stands undivided, choices are unmistakable, and the soul is invited to walk the narrow path between light and darkness with unwavering conviction.", categories: ["Doctrine & Revelation", "Wisdom & Character"] },
        { title: "Seizing The Kingdom: Why violent men try to seize the kingdom", file: "Seizing The Kingdom.pdf", description: "A profound exploration of the hidden tension between force and surrender, Seizing The Kingdom unveils why men, driven by a deep spiritual hunger, attempt to grasp what can only be received. It reveals that the true battle is not outward conquest, but inward transformation—where the ego resists, yet the soul longs to yield. In the end, the kingdom is not taken by strength, but revealed through surrender.", categories: ["Spiritual Growth", "Kingdom Living"] },
        { title: "Freedom Syndrome", file: "Freedom Syndrome.pdf", description: "Freedom Syndrome explores the hidden paradox of liberation—the unsettling reality that true freedom can feel overwhelming when the soul is unprepared for it. The article reflects on how the absence of structure can lead to confusion, drift, or inner emptiness, and reveals that genuine freedom is not found in limitless choices, but in alignment with truth, purpose, and inner discipline. It is a profound invitation to move beyond mere escape and into a deeper, anchored form of being.", categories: ["Spiritual Growth"] },
        { title: "Tuning The Mind", file: "Tuning The Mind.pdf", description: "A profound reflection on the art of inner alignment, Tuning the Mind explores how clarity, peace, and truth emerge not through control, but through conscious awareness and intentional focus. It invites the reader to quiet the noise, refine their inner frequency, and rediscover the still, powerful center within.", categories: ["Spiritual Growth"] },
        { title: "The Kingdom Within", file: "The Kingdom Within.pdf", description: "A quiet revelation unfolds: the Kingdom we seek is not beyond us, but within. In stillness, beneath the noise of the world, we rediscover a divine presence that has always been whole—waiting not to be found, but to be realized.", categories: ["Doctrine & Revelation"] },
        { title: "The Power Of Love", file: "The Power Of Love.pdf", description: "Love is not merely an emotion—it is a transformative force that reshapes the human soul. This article explores love as a quiet strength, a mirror of truth, and a refining fire that calls us beyond ego into deeper alignment. In choosing love, even when it is difficult, we discover not only connection with others—but the unfolding of our highest self.", categories: ["Doctrine & Revelation"] },
        { title: "Setting Boundaries", file: "Setting Boundaries.pdf", description: "A powerful reflection on the unseen cost of people-pleasing, Setting Boundaries challenges the belief that endless giving is a virtue. It reveals how the absence of limits leads to self-abandonment, and how reclaiming one’s inner space is an act of truth, not selfishness. With quiet intensity, the article invites readers to draw sacred lines—not to shut others out, but to finally return to themselves.", categories: ["Wisdom & Character"] },
        { title: "Cry Of The Watchers", file: "Cry Of The Watchers.pdf", description: "A prophetic call to spiritual remembrance, this article declares the awakening of the Watchers and the convergence of the elect in the final hour of divine unveiling", categories: ["Prophetic Scrolls"] },
        { title: "The Refining Fire", file: "The Refining Fire.pdf", description: "A prophetic reflection on divine purification, this article portrays the Refining Fire as God’s transforming process through which the Elect are cleansed, tested, and made vessels of eternal light", categories: ["Prophetic Scrolls"] },
        { title: "God Gives His Hardest Battles To His Strongest Soldiers", file: "God's Hardest Battles.pdf", description: "This article affirms that life’s hardest trials are divine assignments meant to refine, strengthen, and prepare God’s chosen soldiers for higher purpose and eternal victory", categories: ["Spiritual Growth"] },
        { title: "Children Of The Lamb", file: "Children of the Lamb.pdf", description: "Children of the Lamb is a profound Christian reflection on the believer’s identity in Christ, emphasizing faith, purity, sacrificial love, and the eternal hope found in Jesus, the Lamb of God.", categories: ["Prophetic Scrolls", "Doctrine & Revelation"] },
        { title: "Thorn In The Flesh", file: "Thorn in the Flesh.pdf", description: "Thorn in the Flesh - is a profound Christian and mystical reflection on how suffering, weakness, and inner struggle become instruments of humility, spiritual transformation, and deeper reliance on God’s sufficient grace.", categories: ["Spiritual Growth"] },
        { title: "When You Are Misunderstood And Falsely Accused", file: "When You Are Misunderstood.pdf", description: "When You Are Misunderstood and Falsely Accused - is a reflective spiritual meditation on enduring injustice with inner strength, integrity, and trust in God, revealing how false accusations refine character rather than define identity.", categories: ["Spiritual Growth", "Wisdom & Character"] },
        { title: "Manifesting Wealth And Riches Through Inner Alignment", file: "Manifesting Wealth And Riches.pdf", description: "Manifesting Wealth and Riches - teaches that lasting abundance flows not from chasing money, but from aligning one’s inner life—values, integrity, purpose, and stillness—so that wealth becomes a natural byproduct of coherence and stewardship.", categories: ["Kingdom Living"] },
        { title: "Faithful Without Fandom - Faith Without Compromise in Leadership", file: "Faithful Without Fandom.pdf", description: "Faithful Without Fandom - is a principled reflection on maintaining moral discernment, clean conscience, and spiritual integrity under flawed political leadership without idolizing power or compromising faith.", categories: ["Kingdom Living"] },
        { title: "Change Your Input Change Your World", file: "Change Your Input Change Your World.pdf", description: "Change Your Input, Change Your World - explores how the thoughts, information, and narratives we repeatedly consume shape our perception of reality, teaching that deliberate mental alignment transforms both inner life and outer experience.", categories: ["Kingdom Living"] },
        { title: "When Silence Is Strength: Choosing Dignity Over Reaction", file: "When Silence Is Strength.pdf", description: "This article teaches that choosing silence over reaction is a disciplined act of dignity and inner strength that preserves peace and protects the integrity of the soul.", categories: ["Wisdom & Character"] }
      ];

      render(all);

      if (!all.length) {
        empty.style.display = "block";
        empty.innerHTML = `
          Could not load <b>${MANIFEST}</b>.<br/>
          This usually means either the file path is wrong or the page is being opened with <b>file:///</b> instead of a web server.<br/>
          Serve the site through localhost or Netlify to let fetch() read JSON files.
        `;
      } else {
        empty.style.display = "none";
        empty.innerHTML = "";
      }
    }
  }

  q.addEventListener("input", applyFilter);
  loadManifest();
</script>
